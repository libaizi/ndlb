<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>脑洞量表 - Top Ten Online</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
</head>
<body>
<div id="app">
  <!-- LOBBY SCREEN -->
  <div id="lobby-screen" class="screen active">
    <div class="lobby-header">
      <div class="logo">🦄 脑洞量表</div>
      <div class="logo-sub">Top Ten Online · P2P 在线版</div>
    </div>
    <div class="lobby-actions">
      <button class="btn btn-primary" onclick="showCreateRoom()">创建房间</button>
      <button class="btn btn-secondary" onclick="showJoinRoom()">加入房间</button>
    </div>

    <div id="create-form" class="room-panel hidden">
      <div class="card-title">创建房间</div>
      <div class="form-group"><label>你的昵称</label><input id="host-name" maxlength="10" placeholder="输入昵称"></div>
      <button class="btn btn-primary" onclick="doCreateRoom()">创建</button>
      <button class="btn btn-sm btn-secondary mt-1" onclick="hideForms()" style="width:auto;margin:8px auto 0">返回</button>
    </div>

    <div id="join-form" class="room-panel hidden">
      <div class="card-title">加入房间</div>
      <div class="form-group"><label>房间码</label><input id="join-code" maxlength="6" placeholder="输入4位房间码" style="text-transform:uppercase;letter-spacing:4px;font-weight:700;text-align:center;font-size:20px"></div>
      <div class="form-group"><label>你的昵称</label><input id="join-name" maxlength="10" placeholder="输入昵称"></div>
      <div style="display:flex;align-items:center;gap:8px;margin:4px 0 12px;font-size:13px;color:var(--g500)">
        <input type="checkbox" id="join-relay-mode" style="width:auto;margin:0">
        <label for="join-relay-mode" style="cursor:pointer">🔄 中继模式（连接困难时勾选）</label>
      </div>
      <button class="btn btn-primary" onclick="doJoinRoomFromIndex()">加入</button>
      <button class="btn btn-sm btn-secondary mt-1" onclick="hideForms()" style="width:auto;margin:8px auto 0">返回</button>
      <div id="join-error" class="error-box hidden"></div>
    </div>

    <div id="waiting-room" class="room-panel hidden">
      <div class="card-title">房间已创建</div>
      <div class="room-code-display" id="room-code-display"></div>
      <div class="room-code-hint">将此房间码分享给其他玩家</div>
      <ul class="player-list" id="waiting-player-list"></ul>
      <div id="waiting-hint" class="text-muted" style="font-size:13px;margin:8px 0">等待玩家加入<span class="wd"></span></div>
      <button class="btn btn-success" id="start-game-btn" onclick="doStartGame()" disabled>至少4人才能开始</button>
    </div>

    <div id="joined-waiting" class="room-panel hidden">
      <div class="card-title">已加入房间</div>
      <div style="text-align:center;font-size:14px;color:var(--g500);margin-bottom:4px">房间码</div>
      <div style="text-align:center;font-size:28px;font-weight:800;color:var(--primary);letter-spacing:4px;margin-bottom:16px" id="joined-room-code"></div>
      <ul class="player-list" id="joined-player-list"></ul>
      <div class="text-muted" style="font-size:13px;margin-top:8px">等待房主开始游戏<span class="wd"></span></div>
    </div>
  </div>
</div>

<div id="connecting-overlay" class="connecting-overlay hidden">
  <div class="spinner"></div>
  <div style="font-weight:600;color:var(--g600);margin-bottom:8px" id="connecting-text">正在连接...</div>
  <div class="conn-steps" id="conn-steps">
    <div class="step" id="conn-step1"><span class="step-icon">⏳</span> 连接信令服务器</div>
    <div class="step" id="conn-step2"><span class="step-icon">⏳</span> 连接房主</div>
    <div class="step" id="conn-step3"><span class="step-icon">⏳</span> 建立P2P通道</div>
  </div>
  <div id="ice-diag-live" style="margin-top:12px;font-size:11px;color:var(--g400);max-width:320px;max-height:80px;overflow-y:auto;text-align:left;word-break:break-all"></div>
</div>

<div id="toast"></div>

<script src="js/network.js"></script>
<script src="js/game.js"></script>
<script>
window.addEventListener('DOMContentLoaded', function() {
  const savedName = localStorage.getItem('ndl playerName') || '';
  if (savedName) {
    document.getElementById('host-name').value = savedName;
    document.getElementById('join-name').value = savedName;
  }
});

const _origDoCreateRoom = doCreateRoom;
doCreateRoom = async function(attemptCount, relayOnly) {
  const name = document.getElementById('host-name').value.trim();
  if (!name) { toast('请输入昵称'); return; }

  localStorage.setItem('ndl playerName', name);

  const code = genCode();
  GS.roomCode = code;
  GS.isHost = true;
  GS.myName = name;
  attemptCount = attemptCount || 1;
  relayOnly = relayOnly || false;

  showConn(attemptCount === 1 ? '正在创建房间...' : `正在创建房间... (第${attemptCount}次)`);
  updateConnProgress('step1');
  iceDiagLog = [];

  try {
    await initHost(code, relayOnly);
    GS.myId = hostPeerId(code);
    GS.players = [{ id: GS.myId, name, number: null, peeked: false, isHost: true }];

    toast('✅ 房间创建成功！正在跳转...');

    sessionStorage.setItem('ndl isHost', 'true');
    sessionStorage.setItem('ndl roomCode', code);
    sessionStorage.setItem('ndl playerName', name);

    setTimeout(function() {
      window.location.href = '/ndlb/room.html';
    }, 500);

  } catch (e) {
    hideConn(); stopHeartbeat();
    if (peer) { try { peer.destroy(); } catch(_){} peer = null; }
    const errInfo = e?.title ? e : classifyError('peer_error', e);
    if (attemptCount < 3 && e?.source !== 'unavailable-id') {
      const delay = attemptCount * 2000;
      toast(`创建失败，${delay/1000}秒后重试...`);
      setTimeout(() => doCreateRoom(attemptCount+1, attemptCount>=2), delay);
    } else {
      showErrorModal({ title: '❌ 创建房间失败', reason: errInfo.reason||String(e),
        solutions: ['PeerJS 云服务可能暂时不可用', '检查网络连接', '公司/校园网可能屏蔽WebSocket', '刷新页面重试'] });
    }
  }
};

function doJoinRoomFromIndex() {
  const code = document.getElementById('join-code').value.trim().toUpperCase();
  const name = document.getElementById('join-name').value.trim();

  if (code.length < 4) { toast('请输入房间码'); return; }
  if (!name) { toast('请输入昵称'); return; }

  localStorage.setItem('ndl playerName', name);

  sessionStorage.setItem('ndl isHost', 'false');
  sessionStorage.setItem('ndl roomCode', code);
  sessionStorage.setItem('ndl playerName', name);

  const relayMode = document.getElementById('join-relay-mode')?.checked || false;
  if (relayMode) sessionStorage.setItem('ndl relayMode', 'true');

  showConn(`正在加入房间 ${code}...`);

  setTimeout(function() {
    window.location.href = '/ndlb/room.html';
  }, 300);
}
</script>
</body>
</html>
